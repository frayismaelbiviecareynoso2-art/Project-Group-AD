{% extends 'base.html' %}

{% block content %}
<h2>Usuarios Registrados</h2>

<table>
    <tr>
        <th>ID</th>
        <th>Nombre</th>
        <th>Email</th>
        <th>Rol</th>
    </tr>

    {% for user in usuarios %}
    <tr>
        <td>{{ user.id }}</td>
        <td>{{ user.nombre }}</td>
        <td>{{ user.email }}</td>
        <td>{{ user.rol }}</td>
    </tr>
    {% endfor %}
</table>

{% endblock %}
